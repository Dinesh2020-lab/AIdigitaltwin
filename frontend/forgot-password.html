<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-container">
    <h1 class="title">Reset Your Password</h1>

    <div class="login-card">
        <h3>Enter your email or Staff ID</h3>

        <form id="forgotPasswordForm">
            <input type="text" id="email" placeholder="Enter your email or Staff ID" required>
            <button type="submit">Send Reset Link</button>
        </form>

        <div class="back-login">
            <a href="index.html">Back to Login</a>
        </div>
    </div>
</div>

<script>
document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;

    // Frontend-only "fake" success message
    alert(`If the account "${email}" exists, a reset link has been sent!`);
    document.getElementById('email').value = ''; // clear input
});
</script>

</body>
</html>
